services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "443:443"
    volumes:
      - ./web:/app
      - ./certs:/app/certs
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=searchdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=2403295@SIT.singaporetech.edu.sg
    networks:
      - appnet

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=searchdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - appnet

  selenium:
    image: selenium/standalone-chrome
    ports:
      - "4444:4444"
    networks:
      - appnet

  git:
    image: alpine/git
    container_name: git-server
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./:/repo
    working_dir: /repo
    networks:
      - appnet

  sonarqube:
    image: sonarqube:community
    hostname: sonarqube
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - appnet

volumes:
  sonarqube_data:
  sonarqube_extensions:

networks:
  appnet: