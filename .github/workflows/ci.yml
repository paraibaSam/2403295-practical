name: ci/cd check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ADMIN_USER: admin
      ADMIN_PASSWORD: "2403295@SIT.singaporetech.edu.sg"
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r web/requirements.txt
      - name: Run integration tests
        working-directory: web
        run: python -m unittest tests/test_app.py -v

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'search-app'
          path: 'web'
          format: 'HTML'
          out: 'reports'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  selenium-test:
    runs-on: ubuntu-latest
    env:
      ADMIN_USER: admin
      ADMIN_PASSWORD: "2403295@SIT.singaporetech.edu.sg"
      DB_HOST: db
      DB_PASSWORD: postgres
    container:
      image: python:3.12
      options: --network-alias=web
    services:
      selenium:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444
      db:
        image: postgres:16
        env:
          POSTGRES_DB: searchdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r web/requirements.txt selenium
      - name: Generate self-signed cert
        run: |
          apt-get update && apt-get install -y openssl
          mkdir -p certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout certs/server.key -out certs/server.crt -subj "/CN=localhost"
      - name: Start Flask server
        working-directory: web
        run: |
          nohup python app.py &
          sleep 5
      - name: Wait for Selenium
        run: |
          for i in {1..10}; do
            curl -sk https://selenium:4444/wd/hub/status && break || sleep 3
          done
      - name: Run Selenium tests
        working-directory: web
        run: python tests/selenium_test.py github

  eslint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint and security plugin
        run: |
          npm install eslint@^9 --save-dev
          npm install eslint-plugin-security --save-dev
          npm install @microsoft/eslint-formatter-sarif --save-dev
      - name: Run ESLint
        run: |
          mkdir -p reports
          npx eslint . --format=@microsoft/eslint-formatter-sarif --output-file=reports/eslint-results.sarif
        continue-on-error: true
      - name: Upload SARIF report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-sarif-report
          path: reports/eslint-results.sarif